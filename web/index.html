  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a6a3ed30-8e3f-4d5b-be40-979767d306fc\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}\n  html,body{background:#111111;min-height:100%;}\n  ::selection{background:#888;color:#fff;}\n  ::-webkit-scrollbar{width:9px;height:9px;}\n  ::-webkit-scrollbar-thumb{background:rgba(128,128,128,.4);border-radius:6px;}\n  ::-webkit-scrollbar-track{background:transparent;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ rootStyle }}\">\n<div style=\"{{ innerStyle }}\">\n\n  <!-- ===== TOP BAR ===== -->\n  <div style=\"{{ topBarStyle }}\">\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;flex-direction:column;cursor:pointer;user-select:none;\" onClick=\"{{ onName }}\">\n        <div style=\"display:flex;align-items:baseline;gap:8px;\"><div style=\"font-size:19px;font-weight:800;letter-spacing:1.5px;color:var(--txt,#fff);\">BAETHOVEN<\u002Fdiv><div style=\"font-size:8.5px;letter-spacing:1.5px;font-weight:600;color:var(--muted,#cfcfcf);\">MPC Sample Melodic Pad Builder<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:8.5px;letter-spacing:2.5px;color:var(--faint,#777);margin-top:3px;display:flex;align-items:center;gap:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--acc,#fff);display:inline-block;\"><\u002Fspan>{{ themeName }}<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ themeOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:50px;left:0;width:208px;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:12px;padding:7px;z-index:60;box-shadow:0 16px 40px rgba(0,0,0,.55);\">\n          <div style=\"font-size:8.5px;letter-spacing:2px;color:var(--faint,#777);padding:5px 8px 7px;\">THEME<\u002Fdiv>\n          <sc-for list=\"{{ themeOptions }}\" as=\"t\" hint-placeholder-count=\"9\">\n            <div style=\"{{ t.style }}\" onClick=\"{{ t.onClick }}\">\n              <div style=\"display:flex;gap:4px;\">\n                <span style=\"width:13px;height:13px;border-radius:4px;border:1px solid rgba(128,128,128,.4);background:{{ t.bg }};\"><\u002Fspan>\n                <span style=\"width:13px;height:13px;border-radius:4px;background:{{ t.pad }};\"><\u002Fspan>\n                <span style=\"width:13px;height:13px;border-radius:4px;background:{{ t.acc }};\"><\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:12px;\">{{ t.name }}<\u002Fspan>\n              <span style=\"margin-left:auto;font-size:11px;color:var(--acc,#fff);\">{{ t.check }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"width:1px;height:34px;background:var(--div,#2a2a2a);\"><\u002Fdiv>\n\n    <!-- KEY -->\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;background:var(--ctrl,#161616);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:8px;color:var(--txt,#eaeaea);font-size:12.5px;cursor:pointer;box-shadow:0 3px 0 var(--sh,#050505);font-weight:500;\" onClick=\"{{ onToggleKey }}\">\n        <span style=\"font-size:9px;letter-spacing:1.5px;color:var(--faint,#777);\">KEY<\u002Fspan>\n        <span>{{ keyLabel }}<\u002Fspan>\n        <span style=\"color:var(--faint,#777);\">&#9662;<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ keyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:46px;left:0;min-width:160px;max-height:300px;overflow:auto;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:10px;padding:6px;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.55);\">\n          <sc-for list=\"{{ keyOptions }}\" as=\"o\" hint-placeholder-count=\"8\">\n            <div style=\"{{ o.style }}\" onClick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- FEEL PRESET removed from here; moved after SCALE -->\n\n    <!-- SCALE -->\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;background:var(--ctrl,#161616);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:8px;color:var(--txt,#eaeaea);font-size:12.5px;cursor:pointer;box-shadow:0 3px 0 var(--sh,#050505);font-weight:500;\" onClick=\"{{ onToggleScale }}\">\n        <span style=\"font-size:9px;letter-spacing:1.5px;color:var(--faint,#777);\">SCALE<\u002Fspan>\n        <span>{{ scale }}<\u002Fspan>\n        <span style=\"color:var(--faint,#777);\">&#9662;<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ scaleOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:46px;left:0;min-width:150px;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:10px;padding:6px;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.55);\">\n          <sc-for list=\"{{ scaleOptions }}\" as=\"o\" hint-placeholder-count=\"8\">\n            <div style=\"{{ o.style }}\" onClick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- FEEL -->\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;background:var(--ctrl,#161616);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:8px;color:var(--txt,#eaeaea);font-size:12.5px;cursor:pointer;box-shadow:0 3px 0 var(--sh,#050505);font-weight:500;\" onClick=\"{{ onToggleMood }}\">\n        <span style=\"font-size:9px;letter-spacing:1.5px;color:var(--faint,#777);\">FEEL<\u002Fspan>\n        <span>{{ mood }}<\u002Fspan>\n        <span style=\"color:var(--faint,#777);\">&#9662;<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ moodOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:46px;left:0;min-width:170px;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:10px;padding:6px;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.55);\">\n          <sc-for list=\"{{ moodOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n            <div style=\"{{ o.style }}\" onClick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isExp }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:38px;width:38px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px;cursor:pointer;background:transparent;color:var(--muted,#cfcfcf);border:1.5px solid var(--cbrd,#3a3a3a);box-shadow:0 3px 0 var(--sh,#050505);\" style-active=\"transform:translateY(2px);box-shadow:0 1px 0 var(--sh);\" onClick=\"{{ onExpRandom }}\" title=\"Randomize key + scale\">&#10227;<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"flex:1;\"><\u002Fdiv>\n\n    <!-- FEEL KNOB + MODE -->\n    <div style=\"display:flex;align-items:center;gap:14px;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px;\">\n        <div onMouseDown=\"{{ onKnobDown }}\" style=\"width:42px;height:42px;border-radius:50%;background:var(--ctrl,#191919);border:1.5px solid var(--acc,#c9c9c9);box-shadow:0 3px 0 var(--sh,#050505), inset 0 2px 5px rgba(0,0,0,.4);position:relative;cursor:ns-resize;\">\n          <div style=\"{{ knobPointerStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:8.5px;letter-spacing:2px;color:var(--faint,#888);\">SHIFT {{ shiftDisplay }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;\">\n        <button style=\"height:38px;padding:0 12px;ba
