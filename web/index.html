    var p = document.body || document.documentElement;

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a6a3ed30-8e3f-4d5b-be40-979767d306fc\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}\n  html,body{background:#111111;min-height:100%;}\n  ::selection{background:#888;color:#fff;}\n  ::-webkit-scrollbar{width:9px;height:9px;}\n  ::-webkit-scrollbar-thumb{background:rgba(128,128,128,.4);border-radius:6px;}\n  ::-webkit-scrollbar-track{background:transparent;}\n  /* per-pad clear (×): hidden until the pad is hovered */\n  .bae-padx{opacity:0;transition:opacity .12s ease;}\n  .bae-pad:hover .bae-padx{opacity:.5;}\n  .bae-padx:hover{opacity:1;}\n  /* SHIFT-mode popup: fades out over 1.2s and holds invisible (forwards) — re-keyed per click so it replays */\n  @keyframes bae-shiftpop{0%{opacity:0;transform:translate(-50%,5px);}14%{opacity:1;transform:translate(-50%,0);}70%{opacity:1;transform:translate(-50%,0);}100%{opacity:0;transform:translate(-50%,-3px);}}\n  .bae-shiftpop{animation:bae-shiftpop 1.2s ease forwards;}\n  /* touch: no tap-highlight, no callout, pads don't fight the touch system */\n  *{-webkit-tap-highlight-color:transparent;}\n  .bae-pad{touch-action:none;-webkit-touch-callout:none;}\n  /* coarse pointers (touch): the per-pad clear (×) can't rely on hover */\n  @media (hover:none){.bae-padx{opacity:.42;}.bae-pad:hover .bae-padx{opacity:.42;}}\n  /* phone: drop the long tagline */\n  @media (max-width:560px){.bae-tag{display:none;}}\n  /* browser \"currently loaded\" markers */\n  .br-replacing { font-size: 0.68em; opacity: 0.45; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }\n  .br-loaded-dot { font-size: 0.7em; opacity: 0.55; margin-right: 3px; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ rootStyle }}\">\n<div style=\"{{ innerStyle }}\">\n\n  <!-- ===== TOP BAR ===== -->\n  <div style=\"{{ topBarStyle }}\">\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;flex-direction:column;cursor:pointer;user-select:none;\" onClick=\"{{ onName }}\">\n        <div style=\"display:flex;align-items:baseline;gap:8px;\"><div style=\"font-size:19px;font-weight:800;letter-spacing:1.5px;color:var(--txt,#fff);\">BAETHOVEN<\u002Fdiv><div class=\"bae-tag\" style=\"font-size:8.5px;letter-spacing:1.5px;font-weight:600;color:var(--muted,#cfcfcf);\">MPC Sample Melodic Pad Builder<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:8.5px;letter-spacing:2.5px;color:var(--faint,#777);margin-top:3px;display:flex;align-items:center;gap:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--acc,#fff);display:inline-block;\"><\u002Fspan>{{ themeName }}<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ themeOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:50px;left:0;width:208px;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:12px;padding:7px;z-index:60;box-shadow:0 16px 40px rgba(0,0,0,.55);\">\n          <div style=\"font-size:8.5px;letter-spacing:2px;color:var(--faint,#777);padding:5px 8px 7px;\">THEME<\u002Fdiv>\n          <sc-for list=\"{{ themeOptions }}\" as=\"t\" hint-placeholder-count=\"9\">\n            <div style=\"{{ t.style }}\" onClick=\"{{ t.onClick }}\">\n              <div style=\"display:flex;gap:4px;\">\n                <span style=\"width:13px;height:13px;border-radius:4px;border:1px solid rgba(128,128,128,.4);background:{{ t.bg }};\"><\u002Fspan>\n                <span style=\"width:13px;height:13px;border-radius:4px;background:{{ t.pad }};\"><\u002Fspan>\n                <span style=\"width:13px;height:13px;border-radius:4px;background:{{ t.acc }};\"><\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:12px;\">{{ t.name }}<\u002Fspan>\n              <span style=\"margin-left:auto;font-size:11px;color:var(--acc,#fff);\">{{ t.check }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"width:1px;height:34px;background:var(--div,#2a2a2a);\"><\u002Fdiv>\n\n    <!-- KEY -->\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;background:var(--ctrl,#161616);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:8px;color:var(--txt,#eaeaea);font-size:12.5px;cursor:pointer;box-shadow:0 3px 0 var(--sh,#050505);font-weight:500;\" onClick=\"{{ onToggleKey }}\">\n        <span style=\"font-size:9px;letter-spacing:1.5px;color:var(--faint,#777);\">KEY<\u002Fspan>\n        <span>{{ keyLabel }}<\u002Fspan>\n        <span style=\"color:var(--faint,#777);\">&#9662;<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ keyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:46px;left:0;min-width:160px;max-height:300px;overflow:auto;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:10px;padding:6px;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.55);\">\n          <sc-for list=\"{{ keyOptions }}\" as=\"o\" hint-placeholder-count=\"8\">\n            <div style=\"{{ o.style }}\" onClick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- KEY OCTAVE -->\n    <div style=\"display:flex;align-items:center;gap:7px;height:38px;padding:0 8px;background:var(--ctrl,#161616);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:8px;color:var(--txt,#eaeaea);box-shadow:0 3px 0 var(--sh,#050505);\">\n      <span style=\"font-size:9px;letter-spacing:1.5px;color:var(--faint,#777);\">OCT<\u002Fspan>\n      <div onClick=\"{{ onOctDown }}\" style=\"cursor:pointer;user-select:none;width:22px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1.5px solid var(--cbrd,#3a3a3a);font-size:15px;font-weight:700;color:var(--muted,#cfcfcf);\" style-active=\"transform:translateY(1px);\" title=\"Octave down\">&minus;<\u002Fdiv>\n      <span style=\"min-width:14px;text-align:center;font-size:13px;font-weight:600;\">{{ keyOctLabel }}<\u002Fspan>\n      <div onClick=\"{{ onOctUp }}\" style=\"cursor:pointer;user-select:none;width:22px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1.5px solid var(--cbrd,#3a3a3a);font-size:15px;font-weight:700;color:var(--muted,#cfcfcf);\" style-active=\"transform:translateY(1px);\" title=\"Octave up\">+<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FEEL PRESET removed from here; moved after SCALE -->\n\n    <!-- SCALE -->\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;background:var(--ctrl,#161616);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:8px;color:var(--txt,#eaeaea);font-size:12.5px;cursor:pointer;box-shadow:0 3px 0 var(--sh,#050505);font-weight:500;\" onClick=\"{{ onToggleScale }}\">\n        <span style=\"font-size:9px;letter-spacing:1.5px;color:var(--faint,#777);\">SCALE<\u002Fspan>\n        <span>{{ scale }}<\u002Fspan>\n        <span style=\"color:var(--faint,#777);\">&#9662;<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ scaleOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:46px;left:0;min-width:150px;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:10px;padding:6px;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.55);\">\n          <sc-for list=\"{{ scaleOptions }}\" as=\"o\" hint-placeholder-count=\"8\">\n            <div style=\"{{ o.style }}\" onClick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- FEEL -->\n    <div style=\"position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:8px;height:38px;padding:0 14px;background:var(--ctrl,#161616);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:8px;color:var(--txt,#eaeaea);font-size:12.5px;cursor:pointer;box-shadow:0 3px 0 var(--sh,#050505);font-weight:500;\" onClick=\"{{ onToggleMood }}\">\n        <span style=\"font-size:9px;letter-spacing:1.5px;color:var(--faint,#777);\">FEEL<\u002Fspan>\n        <span>{{ mood }}<\u002Fspan>\n        <span style=\"color:var(--faint,#777);\">&#9662;<\u002Fspan>\n      <\u002Fdiv>\n      <sc-if value=\"{{ moodOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;top:46px;left:0;min-width:170px;background:var(--panel,#1b1b1b);border:1.5px solid var(--cbrd,#3a3a3a);border-radius:10px;padding:6px;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.55);\">\n          <sc-for list=\"{{ moodOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n            <div style=\"{{ o.style }}\" onClick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isExp }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"height:38px;width:38px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px;cursor:pointer;background:transparent;color:var(--muted,#cfcfcf);border:1.5px solid var(--cbrd,#3a3a3a);box-shadow:0 3px 0 var(--sh,#050505);\" style-active=\"transform:translateY(2px);box-shadow:0 1px 0 var(--sh);\" onClick=\"{{ onExpRandom }}\" title=\"Randomize key + scale\">&#10227;<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- SHIFT KNOB — click cycles Pad/Global/Random (popup), drag sets amount; EXPORT sits to its right -->\n    <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;\">\n      <sc-if value=\"{{ shiftPop }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"bae-shiftpop\" key=\"{{ shiftPopKey } tes) at stringify time. New ints I add stay ints; new floats use the wrapper.\n    // Second wrap: the int64 eventList/seqEventList length 9223372036854775807 (int64-max). JS Numbers\n    // round it to ...776000, which MPC rejects. The float regex skips it (no decimal), so wrap the exact\n    // literal with the same __f__ sentinel (it just re-emits raw text) -> the precise int64 survives.\n    const obj=JSON.parse(tpl.slice(brace)\n      .replace(/([:\\[,]\\s*)(-?\\d+\\.\\d+(?:[eE][+-]?\\d+)?)(?=\\s*[,\\]}])/g,(m,pre,num)=>pre+'{\"__f__\":\"'+num+'\"}')\n      .replace(/([:\\[,]\\s*)(9223372036854775807)(?=\\s*[,\\]}])/g,(m,pre,num)=>pre+'{\"__f__\":\"'+num+'\"}'));\n    const data=obj.data; const insts=data.tracks[0].program.drum.instruments; const used=[];\n    for(let gp=0;gp<128;gp++){\n      const file=ps[gp]; if(!file)continue;\n      const inst=insts[gp]; if(!inst||!inst.layersv||!inst.layersv[0])continue;\n      const L=inst.layersv[0]; L.active=true; L.sampleName=file; L.sampleFile=file+'.wav';\n      // The playable region comes from sliceInfo, NOT sampleEnd (sampleEnd:0 is normal). The template's\n      // sliceInfo.End is 0 (empty pad) -> a zero-length window -> silent pad. Set it to the WAV's frame\n      // count (AudioBuffer.length) so the whole sample plays; keep every other sliceInfo field as-is.\n      if(L.sliceInfo){ L.sliceInfo.Start=0; L.sliceInfo.End=(pf[gp]||0); L.sliceInfo.LoopStart=0; }\n      L.sampleStart=0; // leave L.sampleEnd at the template's 0 (matches a real kit)\n      inst.whichMuteGroup=(mg[gp]||0); inst.triggerMode=0; used.push(file);\n    }\n    // tempo + tune are FLOAT fields in a real kit (rootNote is int); emit them as 0.0 via the wrapper.\n    data.samples=used.map(name=>({ version:1, name:name, path:name+'.wav', loadImpl:0, metadata:{ tempo:{__f__:'0.0'}, rootNote:60, tune:{__f__:'0.0'}, key:'' } }));\n    // \"Load Kit\" pulls samples onto pads from the drum TRACK's own sample list, NOT the top-level\n    // data.sampl
