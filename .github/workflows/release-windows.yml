name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload EXE to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: f01d6c34fbfbd38e46aef9dcf1bb19a1
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler r2 object put terminator-samples/baethoven/Baethoven_${{ inputs.version }}_x64-setup.exe `
            --file src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Baethoven_${{ inputs.version }}_x64-setup.exe `
            --remote

      - name: Upload sig to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: f01d6c34fbfbd38e46aef9dcf1bb19a1
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler r2 object put terminator-samples/baethoven/Baethoven_${{ inputs.version }}_x64-setup.exe.sig `
            --file src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Baethoven_${{ inputs.version }}_x64-setup.exe.sig `
            --remote

      - name: Output sig for version.json
        run: |
          type src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\Baethoven_${{ inputs.version }}_x64-setup.exe.sig
