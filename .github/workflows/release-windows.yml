name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build Windows Electron app
        run: npx electron-builder --config electron-builder.json --win --x64 --publish never

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: baethoven-windows-${{ inputs.version }}
          path: release/Baethoven-Setup-${{ inputs.version }}.exe
